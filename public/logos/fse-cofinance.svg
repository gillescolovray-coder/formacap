<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo placeholder « Cofinancé par l'Union européenne — FSE+ »
  À remplacer par le fichier officiel téléchargeable sur :
  https://commission.europa.eu/funding-tenders/managing-your-project/communicating-and-raising-eu-visibility/use-emblem_fr

  Ce SVG reproduit le drapeau européen (étoiles jaunes sur fond bleu Reflex).
  Couleurs officielles :
    - Bleu Reflex : Pantone 280 → #003399 en sRGB
    - Jaune       : Pantone 109 → #FFCC00 en sRGB
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img"
     aria-label="Cofinancé par l'Union européenne — Fonds Social Européen +">
  <!-- Drapeau européen -->
  <rect width="240" height="120" fill="#003399"/>
  <g fill="#FFCC00">
    <!-- 12 étoiles disposées sur un cercle imaginaire centré (120, 60), rayon 38 -->
    <g id="star-template">
      <path d="M0,-7 L1.65,-2.16 L6.66,-2.16 L2.61,0.83 L4.11,5.66 L0,2.66 L-4.11,5.66 L-2.61,0.83 L-6.66,-2.16 L-1.65,-2.16 Z"/>
    </g>
    <use href="#star-template" transform="translate(120, 22)"/>
    <use href="#star-template" transform="translate(139, 27.09)"/>
    <use href="#star-template" transform="translate(153.91, 41)"/>
    <use href="#star-template" transform="translate(159, 60)"/>
    <use href="#star-template" transform="translate(153.91, 79)"/>
    <use href="#star-template" transform="translate(139, 92.91)"/>
    <use href="#star-template" transform="translate(120, 98)"/>
    <use href="#star-template" transform="translate(101, 92.91)"/>
    <use href="#star-template" transform="translate(86.09, 79)"/>
    <use href="#star-template" transform="translate(81, 60)"/>
    <use href="#star-template" transform="translate(86.09, 41)"/>
    <use href="#star-template" transform="translate(101, 27.09)"/>
  </g>
  <!-- Légende -->
  <rect y="120" width="240" height="40" fill="#FFFFFF"/>
  <text x="120" y="138" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="11"
        font-weight="700" fill="#003399">
    Cofinancé par
  </text>
  <text x="120" y="152" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="11"
        font-weight="700" fill="#003399">
    l'Union européenne — FSE+
  </text>
</svg>
